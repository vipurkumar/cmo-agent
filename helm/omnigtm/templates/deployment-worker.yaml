apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnigtm.fullname" . }}-worker
  labels:
    {{- include "omnigtm.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "omnigtm.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omnigtm.workerSelectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "omnigtm.fullname" .) }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "omnigtm.fullname" . }}
            - secretRef:
                name: {{ include "omnigtm.fullname" . }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r = redis.from_url(__import__('os').environ.get('CMO_REDIS_URL', 'redis://localhost:6379')); r.ping()"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
