<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMO Agent</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-border: rgba(148, 163, 184, 0.1);
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --radius: 8px;
            --sidebar-width: 240px;
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* ---- Auth Screen ---- */
        #auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg);
        }

        .auth-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 400px;
            max-width: 90vw;
            text-align: center;
        }

        .auth-container h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .auth-container p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .auth-container input[type="text"],
        .auth-container input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .auth-container input:focus {
            border-color: var(--primary);
        }

        .error { color: var(--error); font-size: 13px; margin-top: 8px; min-height: 20px; }

        /* ---- Buttons ---- */
        button, .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-primary, #auth-btn {
            background: var(--primary);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover, #auth-btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.1);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ---- App Layout ---- */
        #app {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Sidebar ---- */
        #sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            padding: 24px 20px 32px;
            letter-spacing: -0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            position: relative;
        }

        .nav-item:hover {
            color: var(--text);
            background: rgba(148, 163, 184, 0.05);
        }

        .nav-item.active {
            color: var(--primary);
            border-left-color: var(--primary);
            background: rgba(129, 140, 248, 0.08);
        }

        .nav-icon { font-size: 16px; width: 20px; text-align: center; }

        .badge {
            background: var(--error);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: auto;
        }

        /* ---- Main Content ---- */
        main#content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--card-border);
            background: var(--sidebar-bg);
            flex-shrink: 0;
        }

        #topbar h2 { font-size: 18px; font-weight: 600; }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #workspace-name {
            color: var(--text-secondary);
            font-size: 13px;
        }

        #logout-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
            padding: 6px 14px;
            font-size: 13px;
        }

        #logout-btn:hover { color: var(--error); border-color: var(--error); }

        #page-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        /* ---- Cards ---- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .card-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        /* ---- Stat Cards ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 20px 24px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.error { color: var(--error); }

        /* ---- Tables ---- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            color: var(--text-secondary);
        }

        tr:hover td { background: rgba(148, 163, 184, 0.03); }

        /* ---- Status Badges ---- */
        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-active, .status-running { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .status-paused { background: rgba(234, 179, 8, 0.15); color: var(--warning); }
        .status-draft { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }
        .status-error { background: rgba(239, 68, 68, 0.15); color: var(--error); }

        /* ---- Loading / Empty ---- */
        .loading, .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            color: var(--text-dim);
            font-size: 14px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--card-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { flex-direction: column; gap: 8px; }

        /* ---- Activity List ---- */
        .activity-list { list-style: none; }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
        }

        .activity-item:last-child { border-bottom: none; }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: 6px;
            flex-shrink: 0;
        }

        .activity-text { font-size: 14px; color: var(--text-secondary); }
        .activity-time { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        /* ---- Automation Widget ---- */
        .auto-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
        }

        .auto-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .auto-dot.active { background: var(--success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
        .auto-dot.paused { background: var(--warning); }

        /* ---- Forms ---- */
        input[type="text"], input[type="email"], input[type="url"],
        textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group { margin-bottom: 16px; }

        /* ---- Content Grid ---- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .content-grid.full { grid-template-columns: 1fr; }

        /* ---- Page Placeholder ---- */
        .page-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            color: var(--text-dim);
            gap: 12px;
        }

        .page-placeholder h3 {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .page-placeholder p { font-size: 14px; }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            #sidebar { display: none; }
            #page-content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Auth screen (shown when no API key) -->
    <div id="auth-screen">
        <div class="auth-container">
            <h1>CMO Agent</h1>
            <p>Enter your API key to get started</p>
            <input type="text" id="api-key-input" placeholder="cmo_..." />
            <button id="auth-btn">Connect</button>
            <p id="auth-error" class="error"></p>
        </div>
    </div>

    <!-- Main app (shown after auth) -->
    <div id="app" style="display:none">
        <nav id="sidebar">
            <div class="logo">CMO Agent</div>
            <a href="#dashboard" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">&#9632;</span> Dashboard
            </a>
            <a href="#campaigns" class="nav-item" data-page="campaigns">
                <span class="nav-icon">&#9654;</span> Campaigns
            </a>
            <a href="#accounts" class="nav-item" data-page="accounts">
                <span class="nav-icon">&#9733;</span> Accounts &amp; Briefs
            </a>
            <a href="#kb" class="nav-item" data-page="kb">
                <span class="nav-icon">&#128218;</span> Knowledge Base
            </a>
            <a href="#settings" class="nav-item" data-page="settings">
                <span class="nav-icon">&#9881;</span> Settings
            </a>
            <a href="#notifications" class="nav-item" data-page="notifications">
                <span class="nav-icon">&#128276;</span> Notifications
                <span id="notif-badge" class="badge" style="display:none">0</span>
            </a>
        </nav>

        <main id="content">
            <header id="topbar">
                <h2 id="page-title">Dashboard</h2>
                <div class="topbar-right">
                    <span id="workspace-name"></span>
                    <button id="logout-btn" title="Disconnect">Logout</button>
                </div>
            </header>
            <div id="page-content">
                <!-- Pages loaded here dynamically -->
            </div>
        </main>
    </div>

    <script>
    (function() {
        'use strict';

        // ---- State ----
        let apiKey = localStorage.getItem('cmo_api_key') || '';
        let notifInterval = null;

        // ---- DOM refs ----
        const authScreen   = document.getElementById('auth-screen');
        const appEl        = document.getElementById('app');
        const authBtn      = document.getElementById('auth-btn');
        const authInput    = document.getElementById('api-key-input');
        const authError    = document.getElementById('auth-error');
        const pageTitle    = document.getElementById('page-title');
        const pageContent  = document.getElementById('page-content');
        const workspaceName = document.getElementById('workspace-name');
        const logoutBtn    = document.getElementById('logout-btn');
        const notifBadge   = document.getElementById('notif-badge');

        // ---- API helper ----
        async function api(path, options = {}) {
            const headers = {
                'Authorization': 'Bearer ' + apiKey,
                'Content-Type': 'application/json',
                ...(options.headers || {}),
            };
            const resp = await fetch(path, { ...options, headers });
            if (resp.status === 401) {
                handleLogout();
                throw new Error('Unauthorized');
            }
            if (!resp.ok) {
                const body = await resp.json().catch(() => ({}));
                throw new Error(body.message || 'Request failed: ' + resp.status);
            }
            return resp.json();
        }

        // ---- Auth flow ----
        function showAuth() {
            authScreen.style.display = 'flex';
            appEl.style.display = 'none';
            if (notifInterval) { clearInterval(notifInterval); notifInterval = null; }
        }

        function showApp() {
            authScreen.style.display = 'none';
            appEl.style.display = 'grid';
            workspaceName.textContent = '';
            route();
            startNotifPolling();
        }

        authBtn.addEventListener('click', async () => {
            const key = authInput.value.trim();
            if (!key) { authError.textContent = 'Please enter an API key.'; return; }
            authError.textContent = '';
            authBtn.disabled = true;
            authBtn.textContent = 'Connecting...';
            try {
                await fetch('/campaigns', {
                    headers: { 'Authorization': 'Bearer ' + key },
                });
                // If we get here (even 200 or non-401), accept the key
                apiKey = key;
                localStorage.setItem('cmo_api_key', key);
                showApp();
            } catch (err) {
                if (err.message === 'Unauthorized') {
                    authError.textContent = 'Invalid API key. Please try again.';
                } else {
                    // Network error or server down — still save key and let user in
                    apiKey = key;
                    localStorage.setItem('cmo_api_key', key);
                    showApp();
                }
            } finally {
                authBtn.disabled = false;
                authBtn.textContent = 'Connect';
            }
        });

        authInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') authBtn.click();
        });

        function handleLogout() {
            apiKey = '';
            localStorage.removeItem('cmo_api_key');
            authInput.value = '';
            authError.textContent = '';
            showAuth();
        }

        logoutBtn.addEventListener('click', handleLogout);

        // ---- Router ----
        const pages = {
            dashboard:     { title: 'Dashboard',          render: renderDashboard },
            campaigns:     { title: 'Campaigns',          render: renderCampaigns },
            accounts:      { title: 'Accounts & Briefs',  render: renderAccounts },
            kb:            { title: 'Knowledge Base',     render: renderKB },
            settings:      { title: 'Settings',           render: renderSettings },
            notifications: { title: 'Notifications',      render: renderNotifications },
        };

        function route() {
            const hash = (location.hash || '#dashboard').slice(1).split('/')[0];
            const page = pages[hash] || pages.dashboard;

            // Update nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === hash);
            });
            pageTitle.textContent = page.title;
            page.render();
        }

        window.addEventListener('hashchange', route);

        // ---- Notification polling ----
        function startNotifPolling() {
            pollNotifs();
            notifInterval = setInterval(pollNotifs, 30000);
        }

        async function pollNotifs() {
            try {
                const data = await api('/api/v1/notifications/unread-count');
                const count = data.unread_count || 0;
                notifBadge.textContent = count;
                notifBadge.style.display = count > 0 ? 'inline' : 'none';
            } catch (e) {
                // Silently ignore polling errors
            }
        }

        // ---- Render Helpers ----
        function showLoading() {
            pageContent.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
        }

        function showEmpty(msg) {
            pageContent.innerHTML = '<div class="empty-state"><p>' + msg + '</p></div>';
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return d.toLocaleDateString();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---- Dashboard Page ----
        async function renderDashboard() {
            showLoading();

            // Fetch all data in parallel, gracefully handle failures
            const [campaignsRes, automationRes, activityRes, notifsRes] = await Promise.allSettled([
                api('/campaigns?page=1&page_size=1'),
                api('/api/v1/automation/status'),
                api('/api/v1/audit/activity?limit=10'),
                api('/api/v1/notifications/unread-count'),
            ]);

            const campaigns   = campaignsRes.status === 'fulfilled' ? campaignsRes.value : null;
            const automation  = automationRes.status === 'fulfilled' ? automationRes.value : null;
            const activity    = activityRes.status === 'fulfilled' ? activityRes.value : null;
            const notifs      = notifsRes.status === 'fulfilled' ? notifsRes.value : null;

            const totalCampaigns = campaigns ? (campaigns.total || 0) : '--';
            const totalBriefs    = '--';
            const unread         = notifs ? (notifs.unread_count || 0) : '--';
            const autoStatus     = automation ? (automation.status || 'unknown') : 'unknown';

            let html = '<div class="stats-grid">';
            html += statCard('Total Campaigns', totalCampaigns, '');
            html += statCard('Automation', autoStatus === 'active' ? 'Active' : autoStatus.charAt(0).toUpperCase() + autoStatus.slice(1), autoStatus === 'active' ? 'success' : autoStatus === 'paused' ? 'warning' : '');
            html += statCard('Total Briefs', totalBriefs, '');
            html += statCard('Unread Notifications', unread, typeof unread === 'number' && unread > 0 ? 'warning' : '');
            html += '</div>';

            html += '<div class="content-grid">';

            // Automation status widget
            html += '<div class="card">';
            html += '<div class="card-header">Automation Status</div>';
            if (automation) {
                const dotClass = autoStatus === 'active' ? 'active' : 'paused';
                html += '<div class="auto-status">';
                html += '<div class="auto-dot ' + dotClass + '"></div>';
                html += '<div>';
                html += '<div style="font-weight:600">' + escapeHtml(autoStatus.charAt(0).toUpperCase() + autoStatus.slice(1)) + '</div>';
                if (automation.paused_reason) {
                    html += '<div style="font-size:13px;color:var(--text-dim)">Reason: ' + escapeHtml(automation.paused_reason) + '</div>';
                }
                if (automation.paused_at) {
                    html += '<div style="font-size:12px;color:var(--text-dim)">Since ' + formatTime(automation.paused_at) + '</div>';
                }
                html += '</div></div>';
            } else {
                html += '<div class="empty-state"><p>Unable to fetch automation status</p></div>';
            }
            html += '</div>';

            // Recent activity
            html += '<div class="card">';
            html += '<div class="card-header">Recent Activity</div>';
            if (activity && activity.items && activity.items.length > 0) {
                html += '<ul class="activity-list">';
                activity.items.forEach(function(item) {
                    html += '<li class="activity-item">';
                    html += '<div class="activity-dot"></div>';
                    html += '<div>';
                    html += '<div class="activity-text">' + escapeHtml(item.description || item.action || 'Activity') + '</div>';
                    html += '<div class="activity-time">' + formatTime(item.created_at || item.timestamp) + '</div>';
                    html += '</div></li>';
                });
                html += '</ul>';
            } else if (activity && activity.items && activity.items.length === 0) {
                html += '<div class="empty-state"><p>No recent activity</p></div>';
            } else {
                html += '<div class="empty-state"><p>Unable to load activity</p></div>';
            }
            html += '</div>';

            html += '</div>'; // content-grid

            pageContent.innerHTML = html;
        }

        function statCard(label, value, colorClass) {
            return '<div class="stat-card">' +
                '<div class="stat-label">' + escapeHtml(label) + '</div>' +
                '<div class="stat-value ' + (colorClass || '') + '">' + escapeHtml(String(value)) + '</div>' +
                '</div>';
        }

        // ---- Placeholder Pages ----
        function renderPlaceholder(name) {
            pageContent.innerHTML =
                '<div class="page-placeholder">' +
                '<h3>' + escapeHtml(name) + '</h3>' +
                '<p>This section is being built. Check back soon.</p>' +
                '</div>';
        }

        function renderCampaigns() {
            if (typeof _renderCampaigns === 'function') _renderCampaigns(pageContent, api);
            else renderPlaceholder('Campaigns');
        }
        function renderAccounts() {
            if (typeof _renderAccounts === 'function') _renderAccounts(pageContent, api);
            else renderPlaceholder('Accounts & Briefs');
        }
        function renderKB() {
            if (typeof _renderKB === 'function') _renderKB(pageContent, api);
            else renderPlaceholder('Knowledge Base');
        }
        function renderSettings() {
            if (typeof _renderSettings === 'function') _renderSettings(pageContent, api);
            else renderPlaceholder('Settings');
        }
        function renderNotifications() {
            if (typeof _renderNotifications === 'function') _renderNotifications(pageContent, api);
            else renderPlaceholder('Notifications');
        }

        // ---- Init ----
        if (apiKey) {
            showApp();
        } else {
            showAuth();
        }
    })();
    </script>

    <!-- Page modules loaded from /app/pages/*.js -->
    <script>
    // Map page file functions to dashboard wrapper names
    function _renderCampaigns(c, a) { if(typeof renderCampaignsPage==='function') renderCampaignsPage(c,a); }
    function _renderAccounts(c, a)  { if(typeof renderAccountsPage==='function') renderAccountsPage(c,a); }
    function _renderKB(c, a)        { if(typeof renderKnowledgeBase==='function') renderKnowledgeBase(c,a); }
    function _renderSettings(c, a)  { if(typeof renderSettingsPage==='function') renderSettingsPage(c,a); }
    function _renderNotifications(c, a) { if(typeof renderNotificationsPage==='function') renderNotificationsPage(c,a); }
